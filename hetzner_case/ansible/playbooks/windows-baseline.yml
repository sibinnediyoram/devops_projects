---
# Baseline configuration for legacy Windows servers.
# Installs windows_exporter for Prometheus monitoring, hardens WinRM,
# and ensures required services are running.
#
# Usage:
#   ansible-playbook playbooks/windows-baseline.yml -i inventories/production/hosts.yml

- name: Windows legacy baseline
  hosts: windows_legacy
  gather_facts: true
  roles:
    - role: windows-baseline
