apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: imago-media-search
  namespace: imago-search
spec:
  version: 8.16.1
  nodeSets:
    - name: data
      count: 3
      config:
        node.roles: ["master", "data", "ingest"]
        xpack.security.enabled: true
        xpack.security.transport.ssl.enabled: true
      podTemplate:
        metadata:
          annotations:
            prometheus.io/scrape: "false"  # metrics exposed via separate exporter deployment
        spec:
          serviceAccountName: media-search
          securityContext:
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: sysctl
              securityContext:
                privileged: true
              command: ["sysctl", "-w", "vm.max_map_count=262144"]
          affinity:
            podAntiAffinity:
              # Hard: no two ES nodes on the same host
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      elasticsearch.k8s.elastic.co/cluster-name: imago-media-search
                  topologyKey: kubernetes.io/hostname
            nodeAffinity:
              # ES runs on storage-pool cloud VMs (CX51, 32GB) — large enough for
              # 16Gi ES heap and hcloud-volumes can attach (cloud, not bare metal)
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node.imago.io/pool
                        operator: In
                        values: [storage]
          containers:
            - name: elasticsearch
              resources:
                requests:
                  cpu: "2"
                  memory: 16Gi
                limits:
                  cpu: "4"
                  memory: 16Gi
              env:
                - name: ES_JAVA_OPTS
                  value: "-Xms8g -Xmx8g"
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes: [ReadWriteOnce]
            storageClassName: hcloud-volumes
            resources:
              requests:
                storage: 500Gi
---
# Separate deployment for Prometheus metrics — avoids coupling exporter lifecycle to ES pods
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch-exporter
  namespace: imago-search
  labels:
    app: elasticsearch-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch-exporter
  template:
    metadata:
      labels:
        app: elasticsearch-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9114"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: prometheuscommunity/elasticsearch-exporter:v1.7.0
          args:
            - --es.uri=https://elastic:$(ELASTIC_PASSWORD)@imago-media-search-es-http:9200
            - --es.ssl-skip-verify  # ECK uses a self-signed CA; use --es.ca for production
            - --es.cluster_settings
            - --es.indices
            - --es.shards
          ports:
            - containerPort: 9114
              name: metrics
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  # ECK creates this secret automatically
                  name: imago-media-search-es-elastic-user
                  key: elastic
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: elasticsearch
  namespace: imago-search
spec:
  minAvailable: 2
  selector:
    matchLabels:
      elasticsearch.k8s.elastic.co/cluster-name: imago-media-search
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: media-search
  namespace: imago-search
---
# NetworkPolicy: allow media-search → ES (ECK service)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: elasticsearch-policy
  namespace: imago-search
spec:
  podSelector:
    matchLabels:
      elasticsearch.k8s.elastic.co/cluster-name: imago-media-search
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # ES cluster transport between nodes
    - from:
        - podSelector:
            matchLabels:
              elasticsearch.k8s.elastic.co/cluster-name: imago-media-search
      ports:
        - port: 9300
    # ES HTTP from media-search service only
    - from:
        - podSelector:
            matchLabels:
              app: media-search
      ports:
        - port: 9200
    # ES HTTP from metrics exporter
    - from:
        - podSelector:
            matchLabels:
              app: elasticsearch-exporter
      ports:
        - port: 9200
    # Prometheus scraping the exporter (not ES directly)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9114
  egress:
    # ES cluster transport between nodes
    - to:
        - podSelector:
            matchLabels:
              elasticsearch.k8s.elastic.co/cluster-name: imago-media-search
      ports:
        - port: 9300
    # Snapshot to object storage (HTTPS)
    - ports:
        - port: 443
          protocol: TCP
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
