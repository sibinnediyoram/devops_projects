apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base resources — staging defaults (replicas: 1, no HPA)
# Production overlay at kubernetes/overlays/production/web-app adds replicas and HPA.
resources:
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
  - ingress.yaml
  - rbac.yaml
