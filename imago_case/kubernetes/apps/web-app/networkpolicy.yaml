apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web-app-ingress
  namespace: imago-web
spec:
  podSelector:
    matchLabels:
      app: web-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
  egress:
    # Allow calling media-search service
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: imago-search
      ports:
        - port: 8081
    # Allow calling media-download service
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: imago-download
      ports:
        - port: 8082
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow calling external APIs (HTTPS)
    - ports:
        - port: 443
          protocol: TCP
