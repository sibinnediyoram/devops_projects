apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: imago-platform-rules
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: imago.web-app
      interval: 30s
      rules:
        - alert: WebAppHighErrorRate
          expr: |
            (
              sum(rate(http_requests_total{namespace="imago-web", status=~"5.."}[5m]))
              /
              sum(rate(http_requests_total{namespace="imago-web"}[5m]))
            ) > 0.01
          for: 5m
          labels:
            severity: critical
            service: web-app
          annotations:
            summary: "Web App HTTP 5xx rate exceeds 1%"
            description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."
            runbook: "https://docs.imago.de/runbooks/web-app-high-error-rate"

        - alert: WebAppHighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{namespace="imago-web"}[5m]))
              by (le)
            ) > 2
          for: 5m
          labels:
            severity: warning
            service: web-app
          annotations:
            summary: "Web App p99 latency exceeds 2 seconds"
            description: "p99 latency is {{ $value }}s."

        - alert: WebAppPodRestartingFrequently
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="imago-web"}[15m]) * 900 > 3
          for: 5m
          labels:
            severity: warning
            service: web-app
          annotations:
            summary: "Web App pod restarting frequently"
            description: "Pod {{ $labels.pod }} has restarted more than 3 times in 15 minutes."

    - name: imago.elasticsearch
      interval: 30s
      rules:
        - alert: ElasticSearchClusterRed
          expr: elasticsearch_cluster_health_status{color="red"} == 1
          for: 1m
          labels:
            severity: critical
            service: elasticsearch
          annotations:
            summary: "ElasticSearch cluster health is RED"
            description: "Cluster has unassigned primary shards. Data loss risk."
            runbook: "https://docs.imago.de/runbooks/elasticsearch-red"

        - alert: ElasticSearchClusterYellow
          expr: elasticsearch_cluster_health_status{color="yellow"} == 1
          for: 10m
          labels:
            severity: warning
            service: elasticsearch
          annotations:
            summary: "ElasticSearch cluster health is YELLOW"
            description: "Cluster has unassigned replica shards."

        - alert: ElasticSearchHighJVMHeap
          expr: |
            elasticsearch_jvm_memory_used_bytes{area="heap"}
            /
            elasticsearch_jvm_memory_max_bytes{area="heap"} > 0.85
          for: 5m
          labels:
            severity: warning
            service: elasticsearch
          annotations:
            summary: "ElasticSearch JVM heap usage above 85%"
            description: "Node {{ $labels.node }} JVM heap is {{ $value | humanizePercentage }}."

        - alert: ElasticSearchDiskSpaceLow
          expr: |
            elasticsearch_filesystem_data_available_bytes
            /
            elasticsearch_filesystem_data_size_bytes < 0.15
          for: 5m
          labels:
            severity: warning
            service: elasticsearch
          annotations:
            summary: "ElasticSearch disk space below 15%"
            description: "Node {{ $labels.node }} has {{ $value | humanizePercentage }} disk remaining."

    - name: imago.media-download
      interval: 30s
      rules:
        - alert: MediaDownloadHighErrorRate
          expr: |
            (
              sum(rate(http_requests_total{namespace="imago-download", status=~"5.."}[5m]))
              /
              sum(rate(http_requests_total{namespace="imago-download"}[5m]))
            ) > 0.005
          for: 5m
          labels:
            severity: critical
            service: media-download
          annotations:
            summary: "Media Download Service error rate exceeds 0.5%"
            description: "Error rate: {{ $value | humanizePercentage }}"

    - name: kubernetes.nodes
      interval: 60s
      rules:
        - alert: NodeMemoryPressure
          expr: |
            (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
            /
            node_memory_MemTotal_bytes > 0.90
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} memory usage above 90%"

        - alert: NodeDiskPressure
          expr: |
            (node_filesystem_size_bytes - node_filesystem_free_bytes)
            /
            node_filesystem_size_bytes > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} disk usage above 85%"

        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready", status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Kubernetes node {{ $labels.node }} is NotReady"
            runbook: "https://docs.imago.de/runbooks/node-not-ready"
