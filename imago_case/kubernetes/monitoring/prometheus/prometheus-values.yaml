# Helm values for kube-prometheus-stack
# Install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     --values kubernetes/monitoring/prometheus/prometheus-values.yaml

grafana:
  enabled: true
  adminPassword: ""  # Set via --set-string or a secret
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    hosts:
      - grafana.imago.de
  persistence:
    enabled: true
    storageClassName: hcloud-volumes
    size: 10Gi
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: imago
          orgId: 1
          folder: IMAGO
          type: file
          options:
            path: /var/lib/grafana/dashboards/imago

prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: 80GB
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: hcloud-volumes
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 100Gi
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi
    # Scrape all namespaces
    podMonitorNamespaceSelector: {}
    serviceMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: hcloud-volumes
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 5Gi
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: default
      group_by: [alertname, namespace, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: pagerduty
          continue: true
        - match:
            severity: warning
          receiver: slack
    receivers:
      - name: default
        slack_configs:
          - api_url: ""  # Set via secret
            channel: "#infra-alerts"
      - name: slack
        slack_configs:
          - api_url: ""  # Set via secret
            channel: "#infra-alerts"
            title: "[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}"
            text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"
      - name: pagerduty
        pagerduty_configs:
          - routing_key: ""  # Set via secret
            description: "{{ .CommonAnnotations.summary }}"

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
