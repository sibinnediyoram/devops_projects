apiVersion: v1
kind: Namespace
metadata:
  name: imago-web
  labels:
    app.kubernetes.io/part-of: imago
    environment: production
---
apiVersion: v1
kind: Namespace
metadata:
  name: imago-search
  labels:
    app.kubernetes.io/part-of: imago
    environment: production
---
apiVersion: v1
kind: Namespace
metadata:
  name: imago-download
  labels:
    app.kubernetes.io/part-of: imago
    environment: production
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/part-of: platform
---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels:
    app.kubernetes.io/part-of: platform
---
apiVersion: v1
kind: Namespace
metadata:
  name: traefik
  labels:
    app.kubernetes.io/part-of: platform
---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    app.kubernetes.io/part-of: platform
---
# Default deny all ingress/egress in application namespaces
# Each app explicitly allows what it needs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: imago-web
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: imago-search
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: imago-download
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
