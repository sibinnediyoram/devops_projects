---
- name: Ensure WinRM HTTPS listener is configured
  ansible.windows.win_shell: |
    $cert = New-SelfSignedCertificate -DnsName $env:COMPUTERNAME -CertStoreLocation Cert:\LocalMachine\My
    $thumb = $cert.Thumbprint
    winrm create winrm/config/Listener?Address=*+Transport=HTTPS "@{Hostname=`"$env:COMPUTERNAME`";CertificateThumbprint=`"$thumb`"}" 2>&1 | Out-Null
    Set-Item -Path WSMan:\localhost\Service\Auth\Basic -Value $false
    Set-Item -Path WSMan:\localhost\Service\Auth\Kerberos -Value $true
  args:
    creates: 'C:\Windows\System32\winrm_configured.marker'

- name: Write WinRM configuration marker
  ansible.windows.win_copy:
    content: "configured"
    dest: 'C:\Windows\System32\winrm_configured.marker'

- name: Open WinRM HTTPS port in Windows Firewall
  community.windows.win_firewall_rule:
    name: WinRM HTTPS
    localport: "{{ winrm_port }}"
    action: allow
    direction: in
    protocol: tcp
    state: present
    enabled: true

- name: Download windows_exporter MSI
  ansible.windows.win_get_url:
    url: "https://github.com/prometheus-community/windows_exporter/releases/download/v{{ windows_exporter_version }}/windows_exporter-{{ windows_exporter_version }}-amd64.msi"
    dest: 'C:\Temp\windows_exporter.msi'

- name: Install windows_exporter
  ansible.windows.win_package:
    path: 'C:\Temp\windows_exporter.msi'
    state: present
    arguments: >-
      ENABLED_COLLECTORS="{{ windows_exporter_enabled_collectors | join(',') }}"
      LISTEN_PORT="{{ windows_exporter_port }}"

- name: Ensure windows_exporter service is running
  ansible.windows.win_service:
    name: windows_exporter
    state: started
    start_mode: auto

- name: Open windows_exporter port in Windows Firewall
  community.windows.win_firewall_rule:
    name: Prometheus windows_exporter
    localport: "{{ windows_exporter_port }}"
    action: allow
    direction: in
    protocol: tcp
    state: present
    enabled: true

- name: Ensure required IMAGO services are running
  ansible.windows.win_service:
    name: "{{ item.name }}"
    state: "{{ item.state }}"
    start_mode: "{{ item.start_mode }}"
  loop: "{{ required_services }}"

- name: Disable Print Spooler on non-print servers
  ansible.windows.win_service:
    name: Spooler
    state: stopped
    start_mode: disabled
  when: "'print' not in group_names"
