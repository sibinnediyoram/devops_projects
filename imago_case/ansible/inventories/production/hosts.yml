---
# Production Ansible inventory
#
# IMPORTANT: Kubernetes nodes (K3s) are NOT listed here.
# K3s nodes are provisioned and configured by Terraform + cloud-init.
# Ansible only manages hosts that are NOT yet on Kubernetes.
#
# When a bare metal host is fully migrated to Kubernetes, remove its entry
# from this file and decommission the physical/cloud server.

all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/imago_ops
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o ProxyJump=bastion.imago.de"

  children:
    # Linux bare metal servers awaiting migration to Kubernetes.
    # Each host here represents a workload that has not yet been containerised.
    # Add a comment per host describing which K8s phase will replace it.
    bare_metal_linux:
      vars:
        ansible_connection: ssh
        monitoring_subnet: "10.0.0.0/16"  # allow node_exporter from cluster
      hosts:
        bm-media-legacy-01:
          ansible_host: 10.0.20.1
          # Hosts the legacy media processing pipeline — target for K8s migration phase 3
        bm-media-legacy-02:
          ansible_host: 10.0.20.2
          # Redundant media node — decommission after bm-media-legacy-01 migrates

    # Windows servers — managed by Ansible long-term.
    # These run internal tooling that is not yet portable to Linux or containers.
    # Each host should have a documented migration evaluation (see migration-strategy.md).
    windows_legacy:
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: kerberos  # prefer kerberos over ntlm in production
        ansible_winrm_server_cert_validation: validate
        ansible_port: 5986  # WinRM HTTPS
      hosts:
        win-internal-app-01:
          ansible_host: 10.0.10.5
          # Hosts ImagoLegacyService — .NET Framework app, migration to .NET 8 planned
        win-internal-app-02:
          ansible_host: 10.0.10.6
          # Hosts internal reporting tool — vendor-managed, no migration path yet
