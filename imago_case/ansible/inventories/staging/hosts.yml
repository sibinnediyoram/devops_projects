---
# Staging Ansible inventory
#
# Mirrors the production structure with fewer hosts.
# Used to test playbook changes before applying to production.
# Run against staging first: ansible-playbook playbooks/site.yml -i inventories/staging/hosts.yml

all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/imago_ops
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o ProxyJump=bastion.staging.imago.de"

  children:
    bare_metal_linux:
      vars:
        ansible_connection: ssh
        monitoring_subnet: "10.1.0.0/16"
      hosts:
        bm-staging-linux-01:
          ansible_host: 10.1.20.1

    windows_legacy:
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: ntlm  # ntlm acceptable in staging (non-production)
        ansible_winrm_server_cert_validation: ignore
        ansible_port: 5986
      hosts:
        win-staging-01:
          ansible_host: 10.1.10.5
