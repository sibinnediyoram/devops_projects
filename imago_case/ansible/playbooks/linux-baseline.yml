---
# Baseline configuration for Linux bare metal servers awaiting K8s migration.
# Applies OS hardening and installs the Prometheus node_exporter so these hosts
# appear in the same monitoring stack as Kubernetes workloads.
#
# Usage:
#   ansible-playbook playbooks/linux-baseline.yml -i inventories/production/hosts.yml

- name: Linux bare metal baseline
  hosts: bare_metal_linux
  become: true
  gather_facts: true
  roles:
    - role: linux-baseline
    - role: monitoring-agent
