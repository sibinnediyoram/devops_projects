name: Hetzner Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to apply
        type: choice
        options: [staging, production]
        default: staging

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: hetzner_k8s_infrastructure/terraform/environments/${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        run: terraform init -input=false
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_cluster_token: ${{ secrets.CLUSTER_TOKEN }}
          TF_VAR_ssh_key_name: ${{ secrets.SSH_KEY_NAME }}
          TF_VAR_bastion_ips: ${{ secrets.BASTION_IPS }}

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Terraform Apply FAILED — ${context.sha.slice(0,7)} (${{ inputs.environment }})`,
              body: `Terraform apply failed on \`${{ inputs.environment }}\` for commit ${context.sha}.\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              labels: ['infrastructure', 'incident']
            });
