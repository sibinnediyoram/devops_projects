name: CI/CD for AWS Terraform EKS

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'aws-tf-eks/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'aws-tf-eks/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, staging, prod]
        default: dev
      action:
        description: Terraform action to run
        type: choice
        options: [plan, apply, destroy]
        default: plan

permissions:
  id-token: write
  contents: read

env:
  TF_ENVS_ROOT: aws-tf-eks/terraform/envs

jobs:
  fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: aws-tf-eks/terraform

  validate:
    name: Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, prod]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ env.TF_ENVS_ROOT }}/${{ matrix.environment }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_ENVS_ROOT }}/${{ matrix.environment }}

  lint:
    name: Lint Terraform Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install TFLint
        run: wget -O - https://raw.githubusercontent.com/terraform-linters/tflint/master/install.sh | bash

      - name: Run TFLint
        run: tflint --recursive
        working-directory: aws-tf-eks/terraform

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install tfsec
        run: |
          curl -L "$(curl -s https://api.github.com/repos/aquasecurity/tfsec/releases/latest | grep browser_download_url | grep linux | cut -d '"' -f 4)" -o tfsec
          chmod +x tfsec
        working-directory: aws-tf-eks

      - name: Run tfsec
        run: ./tfsec terraform
        working-directory: aws-tf-eks

  test:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: [fmt, validate, lint, security]
    strategy:
      matrix:
        environment: [dev, staging, prod]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # TODO: replace with the real per-environment GitHub Actions deploy role before use
          role-to-assume: arn:aws:iam::ACCOUNT_ID:role/github-actions-deploy
          aws-region: eu-central-1

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_ENVS_ROOT }}/${{ matrix.environment }}

      - name: Terraform Plan
        run: terraform plan -detailed-exitcode
        working-directory: ${{ env.TF_ENVS_ROOT }}/${{ matrix.environment }}

  deploy:
    name: Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply'
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # TODO: replace with the real per-environment GitHub Actions deploy role before use
          role-to-assume: arn:aws:iam::ACCOUNT_ID:role/github-actions-deploy
          aws-region: eu-central-1

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_ENVS_ROOT }}/${{ inputs.environment }}

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ${{ env.TF_ENVS_ROOT }}/${{ inputs.environment }}

  destroy:
    name: Destroy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # TODO: replace with the real per-environment GitHub Actions deploy role before use
          role-to-assume: arn:aws:iam::ACCOUNT_ID:role/github-actions-deploy
          aws-region: eu-central-1

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_ENVS_ROOT }}/${{ inputs.environment }}

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: ${{ env.TF_ENVS_ROOT }}/${{ inputs.environment }}
