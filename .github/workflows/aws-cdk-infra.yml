name: AWS CDK Infra

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'aws_cdk_infra/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'aws_cdk_infra/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, prod]
        default: dev
      action:
        description: Action to run
        type: choice
        options: [synth, deploy, destroy]
        default: synth

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: aws_cdk_infra

jobs:
  validate:
    name: Build, Test & Synth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: aws_cdk_infra/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: CDK Synth
        run: npx cdk synth --context env=dev

  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'deploy'
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: aws_cdk_infra/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # TODO: replace with the real per-environment GitHub Actions deploy role before use
          role-to-assume: arn:aws:iam::ACCOUNT_ID:role/github-actions-deploy
          aws-region: eu-central-1

      - name: CDK Deploy
        run: npx cdk deploy --context env=${{ inputs.environment }} --require-approval never

  destroy:
    name: Destroy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: aws_cdk_infra/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # TODO: replace with the real per-environment GitHub Actions deploy role before use
          role-to-assume: arn:aws:iam::ACCOUNT_ID:role/github-actions-deploy
          aws-region: eu-central-1

      - name: CDK Destroy
        run: npx cdk destroy --context env=${{ inputs.environment }} --force
